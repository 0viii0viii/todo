name: Release

# v로 시작하는 태그를 push하면 (예: v0.1.0) macOS/Windows 설치파일을 빌드해
# GitHub Release(초안)에 자동 업로드한다.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Supabase 값은 리포지토리 Secrets로 주입 (Settings → Secrets and variables → Actions)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # 자동 업데이트 서명 (updater 아티팩트에 .sig 생성 + latest.json)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '할 일 ${{ github.ref_name }}'
          releaseBody: |
            데스크톱 투두 앱.
            - **macOS**: `.dmg` 를 내려받아 설치
            - **Windows**: `.exe`(NSIS) 또는 `.msi` 를 내려받아 설치

            ---
            #### ⚠️ 최초 실행 안내 (Apple 공증이 없어 경고가 뜹니다)

            **macOS** — "악성 소프트웨어 여부를 확인할 수 없습니다" 경고가 뜨면, 아래 둘 중 하나로 열어주세요.

            - **터미널 (가장 확실)** — 앱을 `응용 프로그램`으로 옮긴 뒤:
              ```
              xattr -dr com.apple.quarantine /Applications/Todo.app
              ```
              그리고 평소처럼 더블클릭.
            - **설정에서 허용** — 앱 더블클릭(경고 닫기) → **시스템 설정 → 개인정보 보호 및 보안** → 아래로 스크롤 → **"그래도 열기"** → 암호 인증. 이후로는 그냥 실행됩니다.

            **Windows** — SmartScreen 경고가 뜨면 **"추가 정보" → "실행"**.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
